<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QualiAI — AI Testing Agent</title>
<style>
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface-2: #252540;
  --border: #2e2e4a;
  --text: #e8e8f0;
  --text-sec: #7b7f9b;
  --accent: #6366f1;
  --green: #22c55e;
  --red: #ef4444;
  --warning: #f59e0b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh;
}
.app { display: flex; flex-direction: column; height: 100vh; }
header {
  padding: 0 24px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.logo { font-weight: 700; font-size: 17px; display: flex; align-items: center; gap: 8px; }
.logo span { color: var(--accent); }
.main { display: flex; flex: 1; overflow: hidden; }
.sidebar {
  width: 320px; border-right: 1px solid var(--border);
  display: flex; flex-direction: column; background: var(--surface);
}
.sidebar-header {
  padding: 16px; border-bottom: 1px solid var(--border);
  font-size: 13px; font-weight: 600; color: var(--text-sec);
}
.report-list { flex: 1; overflow-y: auto; padding: 8px; }
.report-item {
  padding: 10px 12px; border-radius: 8px; cursor: pointer;
  font-size: 12px; margin-bottom: 4px;
  background: var(--surface-2); border: 1px solid var(--border);
  transition: all 0.15s;
}
.report-item:hover { border-color: var(--accent); }
.report-item .name { font-weight: 500; color: var(--text); margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.report-item .meta { font-size: 11px; color: var(--text-sec); }
.content { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.input-section {
  padding: 20px 24px; border-bottom: 1px solid var(--border);
}
.input-section textarea {
  width: 100%; min-height: 80px; padding: 12px; border-radius: 8px;
  background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
  font-size: 13px; line-height: 1.6; resize: vertical; font-family: inherit;
}
.input-section textarea:focus { outline: none; border-color: var(--accent); }
.input-section textarea::placeholder { color: var(--text-sec); }
.input-row {
  display: flex; gap: 10px; margin-top: 10px; align-items: center;
  flex-wrap: wrap;
}
.input-row select, .input-row input {
  padding: 6px 10px; border-radius: 6px;
  background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
  font-size: 12px; font-family: inherit;
}
.input-row select:focus, .input-row input:focus { outline: none; border-color: var(--accent); }
.input-row input { flex: 1; min-width: 150px; }
.btn {
  padding: 8px 20px; border-radius: 8px; border: none;
  font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
  transition: opacity 0.15s; white-space: nowrap;
}
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
.btn-danger { background: var(--red); color: #fff; }
.steps-section {
  flex: 1; overflow-y: auto; padding: 16px 24px;
}
.step-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; margin-bottom: 10px; overflow: hidden;
}
.step-header {
  padding: 12px 16px; display: flex; align-items: center; gap: 12px;
}
.step-num {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600;
  background: var(--surface-2); color: var(--text-sec); flex-shrink: 0;
}
.step-num.pass { background: var(--green); color: #fff; }
.step-num.fail { background: var(--red); color: #fff; }
.step-num.running { background: var(--accent); color: #fff; animation: pulse 1s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.step-action {
  font-size: 12px; font-weight: 600; color: var(--accent);
  min-width: 60px;
}
.step-desc { flex: 1; font-size: 13px; color: var(--text); }
.step-status {
  font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 12px;
}
.step-status.pass { background: #22c55e20; color: var(--green); }
.step-status.fail { background: #ef444420; color: var(--red); }
.step-status.pending { background: var(--surface-2); color: var(--text-sec); }
.step-body { padding: 0 16px 12px; display: none; }
.step-body.open { display: block; }
.step-body img {
  width: 100%; max-width: 600px; border-radius: 8px;
  border: 1px solid var(--border); margin-top: 8px;
}
.step-reason {
  padding: 8px 12px; border-radius: 6px; margin-top: 8px;
  font-size: 12px; background: #2a1020; color: var(--red);
}
.step-reason.pass { background: #0a2018; color: var(--green); }
.step-meta {
  font-size: 11px; color: var(--text-sec); margin-top: 6px;
}
.progress-bar {
  height: 4px; background: var(--border); border-radius: 2px;
  margin: 0 24px;
}
.progress-fill {
  height: 100%; background: var(--accent); border-radius: 2px;
  transition: width 0.3s ease; width: 0%;
}
.summary {
  display: flex; gap: 16px; margin: 12px 24px;
}
.summary-item {
  flex: 1; text-align: center; padding: 10px;
  border-radius: 8px; background: var(--surface); border: 1px solid var(--border);
}
.summary-item .num { font-size: 24px; font-weight: 700; }
.summary-item .label { font-size: 11px; color: var(--text-sec); margin-top: 2px; }
.summary-item.pass .num { color: var(--green); }
.summary-item.fail .num { color: var(--red); }
.type-btn { padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: inherit; border: 1px solid var(--border); background: var(--surface-2); color: var(--text-sec); transition: all 0.15s; }
.type-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.type-btn:hover { border-color: var(--accent); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">Quali<span>AI</span></div>
    <div style="font-size:12px;color:var(--text-sec)">AI-Powered Testing Agent</div>
  </header>
  <div class="main">
    <div class="sidebar">
      <div class="sidebar-header">Test Reports</div>
      <div class="report-list" id="reportList">
        <div style="text-align:center;padding:20px;font-size:12px;color:var(--text-sec)">No reports yet</div>
      </div>
    </div>
    <div class="content">
      <div class="input-section">
        <textarea id="taskInput" rows="3" placeholder="Describe the test scenario in natural language...&#10;&#10;例如: 测试登录页面，输入admin/password验证能否登录成功"></textarea>
        <div class="input-row">
          <div style="display:flex;gap:6px">
            <button class="type-btn active" data-type="web" onclick="setType('web')">Web</button>
            <button class="type-btn" data-type="android" onclick="setType('android')">Android</button>
          </div>
          <input type="text" id="targetInput" placeholder="URL 或 App 包名 (可选)" />
          <input type="text" id="deviceInput" placeholder="ADB Device ID" style="display:none;max-width:160px" />
          <button class="btn btn-primary" id="runBtn" onclick="planAndRun()">Run Test</button>
        </div>
        <div class="progress-bar" id="progressBar" style="margin:12px 0 0 0;display:none">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
      <div id="stepsContainer" class="steps-section"></div>
    </div>
  </div>
</div>

<script>
let currentType = "web";
let eventSource = null;
let taskId = null;
let isRunning = false;

function setType(type) {
  currentType = type;
  document.querySelectorAll(".type-btn").forEach(b => b.classList.toggle("active", b.dataset.type === type));
  document.getElementById("deviceInput").style.display = type === "android" ? "block" : "none";
  document.getElementById("targetInput").placeholder = type === "android" ? "App 包名 (如 com.example.app)" : "URL (可选)";
}

function addStepCard(step, index) {
  const container = document.getElementById("stepsContainer");
  const icons = { navigate: "navigate", click: "click", type: "type", assert: "assert", wait: "wait", scroll: "scroll", back: "back", home: "home", swipe: "swipe" };
  const action = step.action || "unknown";

  const card = document.createElement("div");
  card.className = "step-card";
  card.id = "step-" + index;
  card.innerHTML =
    '<div class="step-header" onclick="toggleStep(' + index + ')">' +
      '<div class="step-num pending" id="num-' + index + '">' + (index + 1) + '</div>' +
      '<div class="step-action">' + action + '</div>' +
      '<div class="step-desc">' + (step.desc || "") + '</div>' +
      '<span class="step-status pending" id="status-' + index + '">PENDING</span>' +
    '</div>' +
    '<div class="step-body" id="body-' + index + '">' +
      '<div class="step-reason pass" id="reason-' + index + '" style="display:none"></div>' +
      '<div id="screenshot-' + index + '"></div>' +
      '<div class="step-meta" id="meta-' + index + '"></div>' +
    '</div>';
  container.appendChild(card);
}

function toggleStep(index) {
  const body = document.getElementById("body-" + index);
  body.classList.toggle("open");
}

function updateStep(index, data) {
  const num = document.getElementById("num-" + index);
  const status = document.getElementById("status-" + index);
  const reason = document.getElementById("reason-" + index);
  const meta = document.getElementById("meta-" + index);

  num.className = "step-num " + (data.passed ? "pass" : "fail");
  status.className = "step-status " + (data.passed ? "pass" : "fail");
  status.textContent = data.passed ? "PASS" : "FAIL";

  if (data.reason) {
    reason.style.display = "block";
    reason.className = "step-reason " + (data.passed ? "pass" : "fail");
    reason.textContent = data.reason;
  }

  if (data.duration) {
    meta.textContent = "Duration: " + data.duration.toFixed(1) + "s";
  }

  if (data.screenshot) {
    document.getElementById("screenshot-" + index).innerHTML =
      '<img src="data:image/png;base64,' + data.screenshot + '" alt="screenshot" />';
  }
}

async function planAndRun() {
  const task = document.getElementById("taskInput").value.trim();
  if (!task || isRunning) return;

  const container = document.getElementById("stepsContainer");
  container.innerHTML = "";
  document.getElementById("progressBar").style.display = "block";
  updateProgress(0);
  isRunning = true;
  document.getElementById("runBtn").disabled = true;
  document.getElementById("runBtn").textContent = "Running...";

  const target = document.getElementById("targetInput").value.trim();
  const device = document.getElementById("deviceInput").value.trim();

  try {
    // Step 1: Plan
    const planRes = await fetch("/api/plan", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        description: task,
        type: currentType,
        url: currentType === "web" ? target : "",
        app: currentType === "android" ? target : "",
      }),
    });
    const planData = await planRes.json();
    if (planData.error) { alert(planData.error); finishRun(); return; }

    const steps = planData.steps;
    steps.forEach((s, i) => addStepCard(s, i));

    // Step 2: Execute
    const runRes = await fetch("/api/run", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        description: task,
        steps: steps,
        type: currentType,
        device: device,
      }),
    });
    const runData = await runRes.json();
    taskId = runData.task_id;

    // Connect SSE
    eventSource = new EventSource("/api/stream/" + taskId);
    eventSource.onmessage = function(event) {
      let data;
      try { data = JSON.parse(event.data); } catch(e) { return; }

      if (data.type === "progress") {
        updateProgress(data.progress);
        // mark current step as running
        const idx = data.step - 1;
        const num = document.getElementById("num-" + idx);
        if (num) {
          num.className = "step-num running";
          document.getElementById("status-" + idx).textContent = "RUNNING";
          document.getElementById("status-" + idx).className = "step-status pending";
        }
      }

      if (data.type === "step_result") {
        const idx = data.step - 1;
        updateStep(idx, data);
        // auto open first failed step
        if (!data.passed) {
          const body = document.getElementById("body-" + idx);
          if (body) body.classList.add("open");
        }
      }

      if (data.type === "completed") {
        updateProgress(100);
        showSummary(data);
        finishRun();
      }

      if (data.type === "error") {
        alert("Error: " + data.message);
        finishRun();
      }
    };
    eventSource.onerror = function() {
      if (isRunning) finishRun();
    };
  } catch (e) {
    alert("Error: " + e.message);
    finishRun();
  }
}

function updateProgress(value) {
  document.getElementById("progressFill").style.width = value + "%";
}

function showSummary(data) {
  const container = document.getElementById("stepsContainer");
  const summary = document.createElement("div");
  summary.className = "summary";
  summary.innerHTML =
    '<div class="summary-item pass"><div class="num">' + data.passed + '</div><div class="label">Passed</div></div>' +
    '<div class="summary-item fail"><div class="num">' + data.failed + '</div><div class="label">Failed</div></div>' +
    '<div class="summary-item"><div class="num">' + data.total + '</div><div class="label">Total</div></div>';
  container.prepend(summary);

  if (data.report) {
    const link = document.createElement("div");
    link.style.cssText = "text-align:center;margin-top:12px";
    link.innerHTML = '<a href="/api/reports/' + data.report + '" target="_blank" style="color:var(--accent);font-size:13px">View Full Report</a>';
    container.appendChild(link);
  }
}

function finishRun() {
  isRunning = false;
  document.getElementById("runBtn").disabled = false;
  document.getElementById("runBtn").textContent = "Run Test";
  if (eventSource) { eventSource.close(); eventSource = null; }
  if (taskId) { fetch("/api/stream/" + taskId, { method: "CLOSE" }).catch(function(){}); taskId = null; }
  loadReports();
}

function loadReports() {
  fetch("/api/reports").then(r => r.json()).then(reports => {
    const list = document.getElementById("reportList");
    if (!reports.length) {
      list.innerHTML = '<div style="text-align:center;padding:20px;font-size:12px;color:var(--text-sec)">No reports yet</div>';
      return;
    }
    list.innerHTML = reports.map(r =>
      '<a href="/api/reports/' + r.path + '" target="_blank" class="report-item">' +
        '<div class="name">' + r.name + '</div>' +
        '<div class="meta">' + r.time + ' - ' + (r.size / 1024).toFixed(1) + ' KB</div>' +
      '</a>'
    ).join("");
  }).catch(function(){});
}

loadReports();
</script>
</body>
</html>
